name: CI Workflow

# Déclenche le workflow sur les pushs et pull requests vers main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest  # Utilise une machine virtuelle Ubuntu

    steps:
      # Étape 1 : Récupérer le code depuis GitHub
      - name: Checkout code
        uses: actions/checkout@v3

      # Étape 2 : Installer Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11  # Adaptez à votre version de Python

      # Étape 3 : Installer les dépendances
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app_api/requirements.txt
          pip install -r data_api/requirements.txt

      # Étape 4 : Exécuter les tests
      - name: Run tests
        run: pytest